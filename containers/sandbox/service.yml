service: sandbox
image: ghcr.io/coderyoss/codery:sandbox-{sha}

# Port formula: host_port = container_port + offset
# blue:  opencode 3000+10000=13000
# green: opencode 3000+20000=23000
port_scheme:
  blue_offset: 10000
  green_offset: 20000

ports:
  - name: opencode
    container_port: 3000
    subdomain: opencode
  - name: opendesign
    container_port: 7456
    subdomain: opendesign
  - name: ssh
    container_port: 22
    fixed_port: 2222
    # No subdomain — raw TCP, not HTTP. Caddy does not proxy this.
    # blue: host 10022  green: host 20022  (port_scheme offsets apply)
    # fixed_port: stable proxy port — orchestrator serve-tcp-proxy forwards
    # connections here to the active color's SSH port automatically.

health_check:
  type: tcp
  port: opencode
  timeout_secs: 60
  interval_secs: 2

volumes:
  - type: bind
    host: /opt/codery/projects
    container: /home/gem/projects
  - type: bind
    host: /opt/codery/data/opencode
    container: /home/gem/.local/share/opencode
  - type: bind
    host: /opt/codery/data/claude
    container: /home/gem/.claude
  - type: bind
    host: /opt/codery/data/opendesign
    container: /home/gem/open-design/.od
  - type: bind
    host: /opt/codery/github-app.pem
    container: /run/secrets/github-app.pem
    readonly: true
  - type: bind
    host: /opt/codery/ssh/authorized_keys
    container: /run/secrets/authorized_keys
    readonly: true

env_overrides:
  GITHUB_APP_PRIVATE_KEY_PATH: /run/secrets/github-app.pem

required_env:
  - GHCR_USERNAME
  - GHCR_TOKEN
  - ANTHROPIC_API_KEY
  - ZAI_API_KEY
  - GITHUB_APP_ID
  - GITHUB_APP_SLUG

network: codery-net

# Allow the container to reach the host (for direct MCP access over Docker bridge).
extra_hosts:
  - host.docker.internal:host-gateway
