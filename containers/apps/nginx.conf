user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WebSocket upgrade mapping: "upgrade" when the client asks, otherwise
    # "close" so plain HTTP keepalive is unaffected.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Log to stdout/stderr for Docker log collection.
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Virtual host configs generated by codery-ci reload-routes, bind-mounted here.
    include /etc/nginx/conf.d/*.conf;
}
