# /etc/nginx/sites-available/codery
# Rendered from hosting/nginx.conf by setup script (envsubst '${DOMAIN_NAME} ${DEPLOY_HOST}')
# Minimal config - only health check endpoint exposed publicly

server {
    listen ${DEPLOY_HOST}:80;
    server_name ${DOMAIN_NAME};

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen ${DEPLOY_HOST}:443 ssl;
    server_name ${DOMAIN_NAME};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Health check endpoint only
    location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","service":"codery","timestamp":"$time_iso8601"}';
    }

    # All other paths return 404
    location / {
        return 404;
    }
}
