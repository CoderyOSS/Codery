name: Build Apps

on:
  push:
    branches: [main, master]
    paths:
      - 'containers/apps/**'
      - '.devcontainer/devcontainer.json'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build apps image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Generate supervisord confs from devcontainer.json
        run: python3 containers/apps/scripts/gen-supervisor-conf.py containers/apps/supervisor/projects.d

      - name: Generate apps-routes.json from devcontainer.json
        run: python3 containers/apps/scripts/gen-apps-routes.py proxy/apps-routes.json

      - name: Build and push apps image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: containers/apps/Dockerfile
          push: true
          tags: |
            ghcr.io/coderyoss/codery:apps-latest
            ghcr.io/coderyoss/codery:apps-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/coderyoss/codery:apps-buildcache
          cache-to: type=registry,ref=ghcr.io/coderyoss/codery:apps-buildcache,mode=max

  deploy:
    name: Deploy apps to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate apps-routes.json from devcontainer.json
        run: python3 containers/apps/scripts/gen-apps-routes.py proxy/apps-routes.json

      - name: Deploy apps via codery-ci
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          trap 'rm -f /tmp/deploy_key' EXIT
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new deploy@${DEPLOY_HOST}"
          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new"

          $SSH "sudo mkdir -p /opt/codery/services /opt/codery/proxy /opt/codery/apps-supervisor.d"
          cat containers/apps/service.yml | $SSH "sudo tee /opt/codery/services/apps.yml"
          $SCP proxy/apps-routes.json deploy@${DEPLOY_HOST}:/opt/codery/proxy/apps-routes.json

          printf '%s\n' "${{ secrets.ENV_FILE }}" | $SSH "cat > /opt/codery/.env"
          $SSH "echo 'GHCR_USERNAME=${{ github.actor }}' >> /opt/codery/.env"
          $SSH "echo 'GHCR_TOKEN=${{ secrets.GITHUB_TOKEN }}' >> /opt/codery/.env"

          $SSH "sudo mkdir -p /opt/codery/state"
          $SSH "sudo /opt/codery/codery-ci deploy apps ${{ github.sha }} 2>&1"
