name: Release Orchestrator

on:
  push:
    tags:
      - 'codery-ci-v*'

jobs:
  build-and-release:
    name: Build and release codery-ci binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            system/orchestrator/target
          key: codery-ci-${{ hashFiles('system/orchestrator/Cargo.lock') }}
          restore-keys: codery-ci-

      - name: Test
        run: cargo test
        working-directory: system/orchestrator

      - name: Build release (musl static binary)
        run: cargo build --release --target x86_64-unknown-linux-musl
        working-directory: system/orchestrator

      - name: Rename binary
        run: |
          cp system/orchestrator/target/x86_64-unknown-linux-musl/release/orchestrator codery-ci-linux-x86_64
          chmod +x codery-ci-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: codery-ci-linux-x86_64
          generate_release_notes: true
