name: Release CoderyCI

on:
  push:
    tags:
      - 'codery-ci-v*'

jobs:
  build:
    name: Build codery-ci (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: codery-ci-linux-x86_64
          - target: aarch64-unknown-linux-musl
            artifact: codery-ci-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: system/orchestrator/ui/package-lock.json

      - name: Build frontend
        working-directory: system/orchestrator/ui
        run: npm ci && npm run build

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            system/orchestrator/target
          key: codery-ci-${{ matrix.target }}-${{ hashFiles('system/orchestrator/Cargo.lock') }}
          restore-keys: codery-ci-${{ matrix.target }}-

      - name: Test
        run: cross test --target ${{ matrix.target }}
        working-directory: system/orchestrator

      - name: Build release
        run: cross build --release --target ${{ matrix.target }}
        working-directory: system/orchestrator

      - name: Rename binary
        run: |
          cp system/orchestrator/target/${{ matrix.target }}/release/codery-ci ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
