name: Sync Routes

on:
  push:
    branches: [master]
    paths: ['proxy/routes.yaml']
  workflow_dispatch:

jobs:
  sync:
    name: Sync routes to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync routes and reload Caddy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          trap 'rm -f /tmp/deploy_key' EXIT
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new deploy@${DEPLOY_HOST}"

          $SSH "mkdir -p /opt/codery/proxy"
          cat proxy/routes.yaml | $SSH "sudo tee /opt/codery/proxy/routes.yaml" > /dev/null
          $SSH "sudo /opt/codery/codery-ci reload-routes 2>&1"
