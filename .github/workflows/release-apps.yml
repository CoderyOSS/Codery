name: Release Apps

on:
  push:
    tags:
      - 'apps-v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push apps image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prevent semver regression
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#apps-v}"
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName -q '.[].tagName' | grep '^apps-v' | head -1 | sed 's/apps-v//')
          if [ -n "$LATEST" ] && [ "$(printf '%s\n%s' "$LATEST" "$TAG_VERSION" | sort -V | tail -1)" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION is not newer than latest release v$LATEST"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build and push apps image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: containers/apps/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:apps-latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:apps-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:apps-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:apps-buildcache,mode=max
