name: Build Sandbox Base

on:
  push:
    branches: [main]
    paths:
      - 'containers/sandbox/Dockerfile.base'
      - 'containers/sandbox/bin/launchy'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push sandbox-base image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build and push sandbox-base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/sandbox/Dockerfile.base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-base-latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-base-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-base-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-base-buildcache,mode=max
