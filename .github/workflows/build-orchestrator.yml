name: Deploy CoderyCI

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy latest codery-ci to VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect VPS architecture
        id: arch
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new deploy@${DEPLOY_HOST}"
          ARCH=$($SSH "uname -m")
          echo "arch=${ARCH}" >> $GITHUB_OUTPUT

      - name: Download latest codery-ci release
        env:
          ARCH: ${{ steps.arch.outputs.arch }}
        run: |
          if [ "${ARCH}" = "aarch64" ]; then
            ARTIFACT=codery-ci-linux-aarch64
          else
            ARTIFACT=codery-ci-linux-x86_64
          fi
          curl -L -o codery-ci \
            "https://github.com/${{ github.repository }}/releases/latest/download/${ARTIFACT}"
          chmod +x codery-ci

      - name: Deploy binary to VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new deploy@${DEPLOY_HOST}"
          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new"

          $SSH "sudo mkdir -p /opt/codery && sudo chown deploy:deploy /opt/codery"

          $SCP codery-ci deploy@${DEPLOY_HOST}:/opt/codery/codery-ci.new
          $SSH "chmod +x /opt/codery/codery-ci.new && mv /opt/codery/codery-ci.new /opt/codery/codery-ci"

          $SSH "/opt/codery/codery-ci --version"

          $SCP proxy/supervisor/conf.d/codery-ci-daemon.conf \
            deploy@${DEPLOY_HOST}:/tmp/codery-ci-daemon.conf
          $SSH "sudo mv /tmp/codery-ci-daemon.conf \
                        /etc/supervisor/conf.d/codery-ci-daemon.conf && \
                  sudo chmod 644 /etc/supervisor/conf.d/codery-ci-daemon.conf"

          $SSH "supervisorctl -c /etc/supervisor/supervisord.conf update"

          $SSH "supervisorctl -c /etc/supervisor/supervisord.conf \
                  restart codery-ci-daemon 2>/dev/null || \
                supervisorctl -c /etc/supervisor/supervisord.conf \
                  start codery-ci-daemon"

          $SSH "supervisorctl -c /etc/supervisor/supervisord.conf status codery-ci-daemon | grep -q RUNNING"

          rm -f /tmp/deploy_key
