name: Build Sandbox

on:
  push:
    branches: [master]
    paths:
      - 'examples/Dockerfile.sandbox'
      - 'containers/sandbox/launchy.json'
      - 'containers/sandbox/docker-entrypoint.d/**'
      - 'containers/sandbox/scripts/**'
      - 'containers/sandbox/service.yml'
      - 'containers/sandbox/tmux.conf'
      - 'opencode.json'
      - 'AGENTS.md'
      - 'containers/sandbox/agents-skills/**'
      - 'containers/sandbox/opencode-global-agents.md'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build sandbox image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: examples/Dockerfile.sandbox
          push: true
          build-args: |
            BASE_TAG=sandbox-base-latest
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codery:sandbox-latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codery:sandbox-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codery:sandbox-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/codery:sandbox-buildcache,mode=max

  deploy:
    name: Deploy sandbox to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy sandbox via codery-ci
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          trap 'rm -f /tmp/deploy_key' EXIT
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new deploy@${DEPLOY_HOST}"
          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=accept-new"

          $SSH "sudo mkdir -p /opt/codery/services /opt/codery/proxy"
          cat containers/sandbox/service.yml | $SSH "sudo tee /opt/codery/services/sandbox.yml" > /dev/null
          cat proxy/sandbox-routes.json | $SSH "sudo tee /opt/codery/proxy/sandbox-routes.json" > /dev/null

          cat opencode.json | $SSH "tee /tmp/opencode-codery.json" > /dev/null
          $SSH "test -d /opt/codery/projects/codery && \
                cp /tmp/opencode-codery.json /opt/codery/projects/codery/opencode.json && \
                echo '[sync] opencode.json → /opt/codery/projects/codery/' || \
                echo '[sync] /opt/codery/projects/codery not present, skipping'"

          $SSH "sudo sed -i '/^GHCR_/d' /opt/codery/.env 2>/dev/null || true"
          $SSH "printf 'GHCR_USERNAME=${{ github.actor }}\nGHCR_TOKEN=${{ secrets.GITHUB_TOKEN }}\n' | sudo tee -a /opt/codery/.env" > /dev/null

          $SSH "mkdir -p /opt/codery/state"

          $SSH "supervisorctl -c /etc/supervisor/supervisord.conf status codery-ci-mcp 2>/dev/null \
            | grep -q RUNNING \
            || supervisorctl -c /etc/supervisor/supervisord.conf start codery-ci-mcp 2>/dev/null \
            || echo '[mcp] codery-ci-mcp not configured yet — skipping'"

          $SSH "sudo /opt/codery/codery-ci deploy sandbox ${{ github.sha }} 2>&1"
