name: Release Sandbox

on:
  push:
    tags:
      - 'sandbox-v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push sandbox image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Download custom Archon binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p containers/sandbox/bin
          gh release download archon-opencode --repo CoderyOSS/codery \
            --pattern 'archon*' -O containers/sandbox/bin/archon-linux-x64
          chmod +x containers/sandbox/bin/archon-linux-x64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: containers/sandbox/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository_owner }}/codery:sandbox-buildcache,mode=max
