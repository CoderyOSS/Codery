<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Codery Deploy Console</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; padding: 24px; }
h1 { font-size: 1.4rem; font-weight: 600; color: #e0e0e0; }
.header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #333; padding-bottom: 16px; }
.header-sub { font-size: 0.8rem; color: #666; }
.cards { display: flex; flex-direction: column; gap: 16px; max-width: 860px; }
.card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 20px; transition: border-color 0.2s, box-shadow 0.2s; min-width: 0; }
.card.in-progress { border-color: #7c3aed; box-shadow: 0 0 0 1px #7c3aed33; }
.card.success { border-color: #4caf50; box-shadow: 0 0 0 1px #4caf5033; }
.card.error { border-color: #ef4444; box-shadow: 0 0 0 1px #ef444433; }
.card.unavailable { background: #1a1a1a; border-color: #2a2a2a; opacity: 0.7; }
.card-inner { align-items: flex-start; justify-content: space-between; gap: 16px; }
.card-left { flex: 1; min-width: 0; overflow: hidden; }
.service-name { font-size: 1.1rem; font-weight: 600; color: #e0e0e0; }
.service-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.badge { border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; font-weight: 600; border: 1px solid; white-space: nowrap; }
.badge-green { background: #1a4a1a; color: #4caf50; border-color: #4caf50; }
.badge-blue { background: #1a3a5c; color: #5c9bd6; border-color: #5c9bd6; }
.meta { font-size: 0.85rem; color: #999; font-family: monospace; display: flex; flex-direction: column; gap: 4px; }
.meta-row { display: flex; align-items: baseline; gap: 4px; min-width: 0; overflow: hidden; }
.meta-row > .lbl { flex-shrink: 0; white-space: nowrap; }
.meta-row > .val { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
.card-right { flex-shrink: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.rollback-target { font-size: 0.8rem; color: #888; font-family: monospace; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; max-width: 240px; }
.rollback-target .meta-row { justify-content: flex-end; }
.rollback-target .target-green { color: #4caf50; }
.rollback-target .target-blue { color: #5c9bd6; }
.first-deploy { font-style: italic; color: #555; font-size: 0.8rem; }
.status-msg { font-size: 0.8rem; min-height: 1.2em; }
.status-msg.spinning { color: #a78bfa; font-style: italic; }
.status-msg.done { color: #4caf50; font-weight: 600; }
.status-msg.err { color: #ef4444; }
.btn { border: none; border-radius: 6px; padding: 8px 20px; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
.btn-rollback { background: #7c3aed; color: #fff; }
.btn-rollback:hover:not(:disabled) { background: #6d28d9; }
.btn-in-progress { background: #4c1d95; color: #a78bfa; border: 1px solid #7c3aed; cursor: not-allowed; opacity: 0.8; }
.btn-done { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; cursor: not-allowed; }
.btn-unavailable { background: #333; color: #555; cursor: not-allowed; }
.btn-restart { background: #374151; color: #d1d5db; }
.btn-restart:hover:not(:disabled) { background: #4b5563; }
.btn-row { display: grid; grid-template-columns: auto auto; gap: 8px; justify-content: end; }
.footer { margin-top: 16px; font-size: 0.75rem; color: #555; max-width: 860px; text-align: right; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@media (min-width: 601px) {
  .card-inner { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 16px; }
}
@media (max-width: 600px) {
  body { padding: 12px; }
  .card { padding: 16px; }
  .card-inner { flex-direction: column; gap: 0; }
  .card-right { text-align: left; align-items: flex-start; width: 100%; border-top: 1px solid #2a2a2a; padding-top: 12px; margin-top: 12px; }
  .rollback-target { align-items: flex-start; max-width: none; }
  .rollback-target .meta-row { justify-content: flex-start; }
  .btn-row { grid-template-columns: 1fr 1fr; }
  .btn { width: 100%; text-align: center; padding: 10px 20px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>Codery Deploy Console</h1>
  <span class="header-sub">Deploy Console</span>
</div>
<div id="cards" class="cards"><p style="color:#666">Loading…</p></div>
<div class="footer">Restart: docker restart · Rollback: restarts stopped container · health-checks · flips Caddy routing</div>

<script>
const rollbackInFlight = new Set(); // keyed by service name
const restartInFlight  = new Set(); // keyed by container name

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Stable DOM id from a container name (hyphens are valid in IDs).
function cid(name) { return 'card-' + name; }

function renderCards(containers) {
  const el = document.getElementById('cards');
  el.innerHTML = '';
  if (!containers.length) {
    el.innerHTML = '<p style="color:#666">No running containers</p>';
    return;
  }
  for (const c of containers) el.appendChild(buildCard(c));
}

function buildCard(c) {
  const id = cid(c.name);
  const card = document.createElement('div');
  card.id = id;
  card.className = 'card';

  const stateClass = c.state === 'running' ? 'badge-green' : 'badge-blue';

  const rollbackBtn = c.rollback_available
    ? `<button class="btn btn-rollback" id="${id}-rbtn"
         onclick="handleRollback(${JSON.stringify(c.service)},${JSON.stringify(c.name)})"
       >↩ Rollback</button>`
    : '';

  const prevRow = c.prev_container
    ? `<div class="meta-row"><span class="lbl">rollback&nbsp;target:</span> <span class="val">${escHtml(c.prev_container)}</span></div>`
    : '';

  card.innerHTML = `
    <div class="card-inner">
      <div class="card-left">
        <div class="service-row">
          <span class="service-name">${escHtml(c.name)}</span>
          <span class="badge ${stateClass}">● ${escHtml(c.state.toUpperCase())}</span>
        </div>
        <div class="meta">
          <div class="meta-row"><span class="lbl">image:</span>  <span class="val">${escHtml(c.image)}</span></div>
          <div class="meta-row"><span class="lbl">status:</span> <span class="val">${escHtml(c.status)}</span></div>
          ${prevRow}
        </div>
      </div>
      <div class="card-right">
        <div class="status-msg" id="${id}-status"></div>
        <div class="btn-row">
          <button class="btn btn-restart" id="${id}-restart"
            onclick="handleRestart(${JSON.stringify(c.name)})"
          >↺ Restart</button>
          ${rollbackBtn}
        </div>
      </div>
    </div>`;
  return card;
}

// ── Shared card helpers ────────────────────────────────────────────────────────

function cardEls(name, suffix) {
  const id = cid(name);
  return {
    card:   document.getElementById(id),
    btn:    document.getElementById(id + suffix),
    status: document.getElementById(id + '-status'),
  };
}

function setProgress(els, label, msg) {
  els.card.classList.add('in-progress');
  els.btn.disabled = true;
  els.btn.className = 'btn btn-in-progress';
  els.btn.textContent = label;
  els.status.className = 'status-msg spinning';
  els.status.innerHTML = '<span class="spin">⟳</span> ' + escHtml(msg);
}

function setSuccess(els, label, msg) {
  els.card.classList.remove('in-progress');
  els.card.classList.add('success');
  els.btn.disabled = true;
  els.btn.className = 'btn btn-done';
  els.btn.textContent = label;
  els.status.className = 'status-msg done';
  els.status.textContent = msg;
}

function setError(els, origClass, origLabel, msg) {
  els.card.classList.remove('in-progress');
  els.card.classList.add('error');
  els.btn.disabled = false;
  els.btn.className = 'btn ' + origClass;
  els.btn.textContent = origLabel;
  els.status.className = 'status-msg err';
  els.status.textContent = '✗ ' + msg;
}

// ── Restart ────────────────────────────────────────────────────────────────────

async function handleRestart(name) {
  if (restartInFlight.has(name)) return;
  restartInFlight.add(name);
  const els = cardEls(name, '-restart');
  els.card.classList.remove('success', 'error');
  setProgress(els, '↺ Restarting…', 'Restarting…');
  try {
    const resp = await fetch('/api/restart/' + encodeURIComponent(name), { method: 'POST' });
    if (resp.ok) {
      setSuccess(els, '✓ Restarted', '✓ Restart complete');
      setTimeout(async () => { restartInFlight.delete(name); await loadStatus(); }, 1500);
    } else {
      const text = await resp.text();
      restartInFlight.delete(name);
      setError(els, 'btn-restart', '↺ Restart', text || 'restart failed');
    }
  } catch (err) {
    restartInFlight.delete(name);
    setError(els, 'btn-restart', '↺ Restart', 'network error');
  }
}

// ── Rollback ───────────────────────────────────────────────────────────────────

async function handleRollback(service, name) {
  if (rollbackInFlight.has(service)) return;
  rollbackInFlight.add(service);
  const els = cardEls(name, '-rbtn');
  els.card.classList.remove('success', 'error');
  setProgress(els, '↩ Rolling back…', 'Rolling back…');
  try {
    const resp = await fetch('/api/rollback/' + encodeURIComponent(service), { method: 'POST' });
    if (resp.ok) {
      setSuccess(els, '✓ Done', '✓ Rollback complete');
      setTimeout(async () => { rollbackInFlight.delete(service); await loadStatus(); }, 500);
    } else {
      const text = await resp.text();
      rollbackInFlight.delete(service);
      setError(els, 'btn-rollback', '↩ Rollback', text || 'rollback failed');
    }
  } catch (err) {
    rollbackInFlight.delete(service);
    setError(els, 'btn-rollback', '↩ Rollback', 'network error');
  }
}

// ── Poll ───────────────────────────────────────────────────────────────────────

async function loadStatus() {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) {
      document.getElementById('cards').innerHTML =
        '<p style="color:#ef4444">Failed to load status: ' + escHtml(resp.statusText) + '</p>';
      return;
    }
    renderCards(await resp.json());
  } catch (err) {
    document.getElementById('cards').innerHTML =
      '<p style="color:#ef4444">Network error loading status</p>';
  }
}

loadStatus();
</script>
</body>
</html>
